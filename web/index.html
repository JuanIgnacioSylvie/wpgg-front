      };
      var ROUTES = {
        '/login': {
          title: 'Iniciar sesión — WPGG',
          description: 'Ingresá a WPGG para completar misiones diarias de League of Legends y ganar tokens WPGG.',
          ogTitle: 'Iniciar sesión — WPGG',

        '/register': {

          ogTitle: 'Crear cuenta — WPGG',

        '/faqs': {

          description: 'Respuestas sobre misiones, tokens WPGG, retiros, canje de RP y cómo funciona la plataforma.',
          ogTitle: 'FAQs — WPGG',

        },
        '/terms': {
          title: 'Términos y condiciones — WPGG',
          description: 'Términos de uso de WPGG, la plataforma de misiones diarias de League of Legends.',
          ogTitle: 'Términos — WPGG',
          ogDescription: 'Condiciones de uso de la plataforma WPGG.'
        }
      };

      function normalizePath(path) {
        if (!path || path === '/') return '/';
        return path.replace(/\/+$/, '') || '/';
      }

      function isPrivate(path) {
        for (var i = 0; i < PRIVATE_PREFIXES.length; i++) {
          if (path === PRIVATE_PREFIXES[i] || path.indexOf(PRIVATE_PREFIXES[i] + '/') === 0) {
            return true;
          }
        }
        return false;
      }

      function esc(value) {
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/"/g, '&quot;')
          .replace(/</g, '&lt;');
      }

      var path = normalizePath(window.location.pathname);
      var meta = ROUTES[path] || DEFAULT;
      var canonical = ORIGIN + (path === '/' ? '/' : path);
      var robots = isPrivate(path) ? 'noindex, nofollow' : 'index, follow, max-image-preview:large';

      document.write('<title>' + esc(meta.title) + '</title>');
      document.write('<meta name="description" content="' + esc(meta.description) + '">');
      document.write('<link rel="canonical" href="' + esc(canonical) + '">');
      document.write('<meta name="robots" content="' + esc(robots) + '">');
      document.write('<meta property="og:url" content="' + esc(canonical) + '">');
      document.write('<meta property="og:title" content="' + esc(meta.ogTitle || meta.title) + '">');
      document.write('<meta property="og:description" content="' + esc(meta.ogDescription || meta.description) + '">');
      document.write('<meta name="twitter:title" content="' + esc(meta.ogTitle || meta.title) + '">');
      document.write('<meta name="twitter:description" content="' + esc(meta.ogDescription || meta.description) + '">');

      window.wpggApplySeo = function (nextPath) {
        var p = normalizePath(nextPath);
        var m = ROUTES[p] || DEFAULT;
        var c = ORIGIN + (p === '/' ? '/' : p);
        var r = isPrivate(p) ? 'noindex, nofollow' : 'index, follow, max-image-preview:large';
        document.title = m.title;
        var desc = document.querySelector('meta[name="description"]');
        if (desc) desc.setAttribute('content', m.description);
        var canon = document.querySelector('link[rel="canonical"]');
        if (canon) canon.setAttribute('href', c);
        var robotsEl = document.querySelector('meta[name="robots"]');
        if (robotsEl) robotsEl.setAttribute('content', r);
        var ogUrl = document.querySelector('meta[property="og:url"]');
        if (ogUrl) ogUrl.setAttribute('content', c);
        var ogTitle = document.querySelector('meta[property="og:title"]');
        if (ogTitle) ogTitle.setAttribute('content', m.ogTitle || m.title);
        var ogDesc = document.querySelector('meta[property="og:description"]');
        if (ogDesc) ogDesc.setAttribute('content', m.ogDescription || m.description);
        var twTitle = document.querySelector('meta[name="twitter:title"]');
        if (twTitle) twTitle.setAttribute('content', m.ogTitle || m.title);
        var twDesc = document.querySelector('meta[name="twitter:description"]');
        if (twDesc) twDesc.setAttribute('content', m.ogDescription || m.description);

    })();

  <style>
    html, body {

      background: #0B0B0F;
    }
    #wpgg-seo-content {
      position: absolute;
      width: 1px;

    #wpgg-splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: radial-gradient(ellipse at 50% 0%, #141419 0%, #0B0B0F 55%);
      transition: opacity 220ms ease, visibility 220ms ease;
    }
    #wpgg-splash.wpgg-splash--hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    #wpgg-splash img {
      width: 72px;
      height: 72px;
      animation: wpgg-splash-pulse 1.6s ease-in-out infinite;
    }
    #wpgg-splash-bar {
      width: 180px;
      height: 3px;
      border-radius: 999px;
      background: #1F1F28;
      overflow: hidden;
    }
    #wpgg-splash-bar span {
      display: block;
      height: 100%;
      width: 40%;
      border-radius: inherit;
      background: #AD1F0F;
      animation: wpgg-splash-bar 1.2s ease-in-out infinite;
    }
    @keyframes wpgg-splash-pulse {
      0%, 100% { transform: scale(1); opacity: 0.92; }
      50% { transform: scale(1.04); opacity: 1; }
    }
    @keyframes wpgg-splash-bar {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(320%); }
    }

  <!--
    OAuth implicit: tokens llegan en #… antes de que Flutter arranque. PathUrlStrategy
    puede hacer replaceState y borrar el hash; guardamos el fragmento aquí (mismo key
    que oauth_callback_fragment_capture_html.dart) para que Dart lo recupere.
  -->
  <script>
    (function () {
      try {
        var key = 'wpgg_oauth_fragment';
        var p = window.location.pathname || '';
        var isCb = p === '/auth/riot-callback' || p.endsWith('/auth/riot-callback');
        if (!isCb) {
          sessionStorage.removeItem(key);
          return;
        }
        var h = window.location.hash;
        if (h.length > 1) {
          var raw = h.substring(1);
          if (/access_token=|id_token=|refresh_token=|(?:^|[&])error=/.test(raw))
            sessionStorage.setItem(key, raw);
        } else {
          sessionStorage.removeItem(key);
        }
      } catch (e) {}
    })();
  </script>

  <script>
    function wpggHideSplash() {
      var el = document.getElementById('wpgg-splash');
      if (!el || el.classList.contains('wpgg-splash--hide')) return;
      el.classList.add('wpgg-splash--hide');
      window.setTimeout(function () { el.remove(); }, 280);
      var seo = document.getElementById('wpgg-seo-content');
      if (seo) seo.remove();
    }
    window.addEventListener('flutter-first-frame', wpggHideSplash);
  </script>
