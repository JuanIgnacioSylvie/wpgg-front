<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Misiones diarias de League of Legends. Ganá tokens WPGG jugando.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="WPGG">
  <meta name="theme-color" content="#AD1F0F">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">

  <!-- Favicons -->
  <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16.png">
  <link rel="icon" type="image/png" sizes="24x24" href="icons/icon-24.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
  <link rel="icon" type="image/png" href="favicon.png">

  <title>WPGG</title>
  <link rel="manifest" href="manifest.json">
  <!--
    OAuth implicit: tokens llegan en #… antes de que Flutter arranque. PathUrlStrategy
    puede hacer replaceState y borrar el hash; guardamos el fragmento aquí (mismo key
    que oauth_callback_fragment_capture_html.dart) para que Dart lo recupere.
  -->
  <script>
    (function () {
      try {
        var key = 'wpgg_oauth_fragment';
        var p = window.location.pathname || '';
        var isCb = p === '/auth/riot-callback' || p.endsWith('/auth/riot-callback');
        if (!isCb) {
          sessionStorage.removeItem(key);
          return;
        }
        var h = window.location.hash;
        if (h.length > 1) {
          var raw = h.substring(1);
          if (/access_token=|id_token=|refresh_token=|(?:^|[&])error=/.test(raw))
            sessionStorage.setItem(key, raw);
        } else {
          sessionStorage.removeItem(key);
        }
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
