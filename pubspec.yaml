name: wpgg_flutter
description: WPGG — cliente Flutter (Clean Architecture).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  flutter_bloc: ^8.1.5
  provider: ^6.1.2
  equatable: ^2.0.5

  go_router: ^14.2.0

  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8

  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  dartz: ^0.10.1

  get_it: ^8.0.0

  cached_network_image: ^3.3.1
  intl: ^0.19.0

  url_launcher: ^6.3.1
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/images/
  fonts:
    - family: Wallpoet
      fonts:
        - asset: assets/fonts/Wallpoet-Regular.ttf
    # Mont: archivo variable OFL (Montserrat) renombrado; sustituible por Mont-*.ttf del spec.
    - family: Mont
      fonts:
        - asset: assets/fonts/Mont-Variable.ttf
