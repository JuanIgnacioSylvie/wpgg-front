name: wpgg_flutter
description: WPGG — cliente Flutter (Clean Architecture).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  flutter_bloc: ^8.1.5
  provider: ^6.1.2
  equatable: ^2.0.5

  go_router: ^14.2.0

  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8

  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  dartz: ^0.10.1

  get_it: ^8.0.0

  cached_network_image: ^3.3.1
  intl: ^0.20.2
  fl_chart: ^0.69.0
  flutter_svg: ^2.0.10+1

  url_launcher: ^6.3.1
  flutter_web_auth_2: ^4.1.0
  web: ^1.1.1
  material_symbols_icons: ^4.2928.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/wpgg_app_icon.png
  remove_alpha_ios: true
  min_sdk_android: 21
  web:
    generate: false

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/images/
    - assets/icons/
  fonts:
    - family: LexendDeca
      fonts:
        - asset: assets/fonts/LexendDeca-Thin.ttf
          weight: 100
        - asset: assets/fonts/LexendDeca-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/LexendDeca-Light.ttf
          weight: 300
        - asset: assets/fonts/LexendDeca-Regular.ttf
          weight: 400
        - asset: assets/fonts/LexendDeca-Medium.ttf
          weight: 500
        - asset: assets/fonts/LexendDeca-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/LexendDeca-Bold.ttf
          weight: 700
        - asset: assets/fonts/LexendDeca-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/LexendDeca-Black.ttf
          weight: 900
    - family: Wallpoet
      fonts:
        - asset: assets/fonts/Wallpoet-Regular.ttf
    # Mont: archivo variable OFL (Montserrat) renombrado; sustituible por Mont-*.ttf del spec.
    - family: Mont
      fonts:
        - asset: assets/fonts/Mont-Variable.ttf
